<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Колесо Фортуны</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f33 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            padding: 30px 20px 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        h1 {
            text-align: center;
            font-size: 1.9rem;
            color: #f0eaff;
            margin-bottom: 12px;
        }
        .wheel-wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 10px auto;
            aspect-ratio: 1/1;
        }
        .wheel-wrapper canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 12px 50px rgba(0,0,0,0.9);
            background: #1b1f2e;
            cursor: grab;
        }
        .pointer {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 44px;
            z-index: 10;
            pointer-events: none;
            color: #ffe484;
        }
        .pointer::after {
            content: "▼";
            display: block;
            text-align: center;
        }
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22%;
            aspect-ratio: 1/1;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #434a6b, #1b1f30);
            border: 3px solid #f5e7b0;
            box-shadow: 0 0 30px rgba(255,215,0,0.4);
            color: #f5e7b0;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
        .center-btn:active {
            transform: translate(-50%, -50%) scale(0.92);
        }
        .settings-panel {
            margin-top: 28px;
            background: rgba(12,15,26,0.7);
            border-radius: 40px;
            padding: 20px 18px 18px;
        }
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            align-items: center;
            justify-content: center;
        }
        .options-grid label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #d2daff;
            font-size: 0.95rem;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .options-grid input[type="number"] {
            background: #0f121f;
            border: 1px solid #3a3f5e;
            border-radius: 30px;
            padding: 8px 14px;
            color: #f0f4ff;
            width: 80px;
            outline: none;
        }
        .options-grid input[type="color"] {
            width: 44px;
            height: 44px;
            border: 2px solid #3d4468;
            border-radius: 40px;
            padding: 2px;
            cursor: pointer;
        }
        .flex-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
            margin-top: 22px;
        }
        .btn {
            background: #2f3655;
            border: none;
            border-radius: 60px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 1rem;
            color: #eef4ff;
            box-shadow: 0 6px 0 #121624;
            cursor: pointer;
        }
        .btn:active {
            transform: translateY(6px);
        }
        .btn-primary {
            background: linear-gradient(145deg, #6a5cd6, #4f3db3);
            color: white;
        }
        .result-box {
            text-align: center;
            margin-top: 18px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffe9a7;
            min-height: 3.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 60px;
            padding: 12px 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎡 Колесо Фортуны</h1>
    <div class="wheel-wrapper">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
        <div class="pointer"></div>
        <div class="center-btn" id="spinBtn">🎲</div>
    </div>
    <div class="settings-panel">
        <div class="options-grid">
            <label>Кол-во <input type="number" id="segmentsCount" value="6" min="2" max="20"></label>
            <label>Цвет фона <input type="color" id="bgColor" value="#1b1f2e"></label>
        </div>
        <div class="flex-buttons">
            <button class="btn btn-primary" id="applyBtn">⟳ Применить</button>
            <button class="btn" id="randomizeBtn">🎲 Случайно</button>
            <button class="btn" id="resetDefaultBtn">↺ Сброс</button>
        </div>
        <div class="result-box" id="resultDisplay">⚡ Нажмите на центр</div>
    </div>
</div>
<script>
    (function() {
        const DEFAULT_SEGMENTS = 6;
        const DEFAULT_BG = '#1b1f2e';
        const DEFAULT_COLORS = ['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#FD79A8','#00CEC9','#FDCB6E','#6C5CE7','#00B894','#E17055','#0984E3','#F368E0'];
        
        let segments = [];
        let currentRotation = 0;
        let isSpinning = false;
        let animationId = null;

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDisplay = document.getElementById('resultDisplay');
        const segmentsCountInput = document.getElementById('segmentsCount');
        const bgColorInput = document.getElementById('bgColor');
        const applyBtn = document.getElementById('applyBtn');
        const randomizeBtn = document.getElementById('randomizeBtn');
        const resetDefaultBtn = document.getElementById('resetDefaultBtn');

        function generateDefaultSegments(count) {
            const segs = [];
            for (let i = 0; i < count; i++) {
                segs.push({ label: String(i + 1), color: DEFAULT_COLORS[i % DEFAULT_COLORS.length] });
            }
            return segs;
        }

        function drawWheel() {
            const w = canvas.width, h = canvas.height;
            const centerX = w/2, centerY = h/2;
            const radius = Math.min(w, h) * 0.44;
            ctx.clearRect(0, 0, w, h);
            const bg = bgColorInput.value || DEFAULT_BG;
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 6, 0, Math.PI * 2);
            ctx.fill();
            if (!segments || segments.length === 0) return;
            const count = segments.length;
            const angleStep = (Math.PI * 2) / count;
            for (let i = 0; i < count; i++) {
                const startAngle = i * angleStep + currentRotation;
                const endAngle = startAngle + angleStep;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = segments[i].color || '#777';
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,240,0.25)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                const midAngle = startAngle + angleStep/2;
                const textRadius = radius * 0.70;
                const x = centerX + Math.cos(midAngle) * textRadius;
                const y = centerY + Math.sin(midAngle) * textRadius;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(midAngle + (midAngle > Math.PI/2 ? Math.PI : 0));
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#fff';
                ctx.fillText(segments[i].label, 0, 0);
                ctx.restore();
            }
        }

        function spinWheel() {
            if (isSpinning) return;
            if (!segments || segments.length < 2) return;
            isSpinning = true;
            spinBtn.style.opacity = '0.5';
            resultDisplay.innerHTML = '🌀 Крутим...';
            const spins = 5 + Math.random() * 6;
            const extraAngle = Math.random() * Math.PI * 2;
            const totalRotation = spins * Math.PI * 2 + extraAngle;
            const startRotation = currentRotation;
            const targetRotation = startRotation + totalRotation;
            const duration = 3000 + Math.random() * 1500;
            const startTime = performance.now();
            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                currentRotation = startRotation + totalRotation * ease;
                drawWheel();
                if (progress < 1) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    currentRotation = targetRotation;
                    drawWheel();
                    isSpinning = false;
                    spinBtn.style.opacity = '1';
                    const count = segments.length;
                    const angleStep = (Math.PI * 2) / count;
                    const upAngle = -Math.PI / 2;
                    let rawAngle = (upAngle - currentRotation) % (Math.PI * 2);
                    if (rawAngle < 0) rawAngle += Math.PI * 2;
                    const idx = Math.floor(rawAngle / angleStep) % count;
                    if (segments[idx]) {
                        resultDisplay.innerHTML = '🎉 Выпало: ' + segments[idx].label;
                    }
                }
            }
            animationId = requestAnimationFrame(animate);
        }

        function applySettings() {
            if (isSpinning) return;
            let newCount = parseInt(segmentsCountInput.value, 10);
            if (isNaN(newCount) || newCount < 2) newCount = 2;
            if (newCount > 20) newCount = 20;
            segmentsCountInput.value = newCount;
            segments = generateDefaultSegments(newCount);
            drawWheel();
            resultDisplay.innerHTML = '✅ Обновлено: ' + newCount + ' секций';
        }

        function randomizeColors() {
            if (isSpinning) return;
            segments.forEach(seg => {
                seg.color = 'hsl(' + Math.floor(Math.random() * 360) + ', 70%, 55%)';
            });
            drawWheel();
            resultDisplay.innerHTML = '🎨 Цвета изменены';
        }

        function resetToDefault() {
            if (isSpinning) return;
            segmentsCountInput.value = DEFAULT_SEGMENTS;
            bgColorInput.value = DEFAULT_BG;
            segments = generateDefaultSegments(DEFAULT_SEGMENTS);
            currentRotation = 0;
            drawWheel();
            resultDisplay.innerHTML = '↺ Сброшено';
        }

        function init() {
            segments = generateDefaultSegments(DEFAULT_SEGMENTS);
            segmentsCountInput.value = DEFAULT_SEGMENTS;
            bgColorInput.value = DEFAULT_BG;
            drawWheel();
            spinBtn.addEventListener('click', spinWheel);
            applyBtn.addEventListener('click', applySettings);
            randomizeBtn.addEventListener('click', randomizeColors);
            resetDefaultBtn.addEventListener('click', resetToDefault);
            canvas.addEventListener('click', spinWheel);
            segmentsCountInput.addEventListener('change', applySettings);
            bgColorInput.addEventListener('input', drawWheel);
        }
        init();
    })();
</script>
</body>
</html>
